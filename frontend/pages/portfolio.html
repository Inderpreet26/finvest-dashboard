<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - FinVest</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-logo">💹 FinVest</div>
        <div class="navbar-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="portfolio.html" class="active">Portfolio</a>
            <a href="market.html">Market</a>
            <a href="news.html">News</a>
        </div>
        <div class="navbar-right">
            <span class="user-info">👤 <span id="username-display"></span></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="main-content">
        <h1 class="page-title">💼 My Portfolio</h1>

        <div class="cards-grid">
            <div class="card">
                <div class="card-label">Total Invested</div>
                <div class="card-value" id="total-invested">Loading...</div>
            </div>
            <div class="card">
                <div class="card-label">Current Value</div>
                <div class="card-value" id="current-value">Loading...</div>
            </div>
            <div class="card">
                <div class="card-label">Profit / Loss</div>
                <div class="card-value" id="profit-loss">Loading...</div>
            </div>
            <div class="card">
                <div class="card-label">P/L Percentage</div>
                <div class="card-value" id="pl-percent">Loading...</div>
            </div>
        </div>

        <!-- Add Investment -->
        <div class="table-container" style="margin-bottom:25px;">
            <h2>➕ Add Investment</h2>
            <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(150px, 1fr)); gap:10px; margin-top:15px;">
                <select id="add-symbol" onchange="fillStockDetails(this.value)"
                style="padding:10px; background:#0a0e1a; border:1px solid #1e2d40; border-radius:8px; color:#fff;">
                    <option value="">-- Select Stock/Crypto --</option>
                </select>
                <input type="text" id="add-name" placeholder="Company Name" readonly
                style="padding:10px; background:#0a0e1a; border:1px solid #1e2d40; border-radius:8px; color:#8892a4;">
                <input type="number" id="add-shares" placeholder="Shares"
                style="padding:10px; background:#0a0e1a; border:1px solid #1e2d40; border-radius:8px; color:#fff;">
                <input type="number" id="add-buy-price" placeholder="Buy Price ($)" readonly
                style="padding:10px; background:#0a0e1a; border:1px solid #1e2d40; border-radius:8px; color:#8892a4;">
                <input type="number" id="add-current-price" placeholder="Current Price ($)" readonly
                style="padding:10px; background:#0a0e1a; border:1px solid #1e2d40; border-radius:8px; color:#8892a4;">
                <button class="btn-primary" onclick="addInvestment()">Add</button>
            </div>
            <p id="add-msg" style="margin-top:10px; font-size:0.9rem;"></p>
        </div>

        <div class="table-container">
            <h2>📊 My Investments</h2>
            <table>
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>Name</th>
                        <th>Shares</th>
                        <th>Buy Price</th>
                        <th>Current Price</th>
                        <th>Total Value</th>
                        <th>P/L</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="portfolio-table">
                    <tr><td colspan="8" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        checkLogin();

        async function loadStockOptions() {
            const stocks = await fetchData(`${API.market}/stocks`);
            const crypto = await fetchData(`${API.market}/crypto`);
            const select = document.getElementById('add-symbol');

            if (stocks) {
                const group = document.createElement('optgroup');
                group.label = '📈 Stocks';
                Object.entries(stocks.stocks).forEach(([symbol, stock]) => {
                    group.innerHTML += `<option value="${symbol}" data-name="${stock.name}" data-price="${stock.price}">${symbol} - ${stock.name}</option>`;
                });
                select.appendChild(group);
            }

            if (crypto) {
                const group = document.createElement('optgroup');
                group.label = '🪙 Crypto';
                Object.entries(crypto.crypto).forEach(([symbol, coin]) => {
                    group.innerHTML += `<option value="${symbol}" data-name="${coin.name}" data-price="${coin.price}">${symbol} - ${coin.name}</option>`;
                });
                select.appendChild(group);
            }
        }

        function fillStockDetails(symbol) {
            const select = document.getElementById('add-symbol');
            const selected = select.options[select.selectedIndex];
            if (!symbol) return;
            document.getElementById('add-name').value = selected.getAttribute('data-name');
            document.getElementById('add-buy-price').value = selected.getAttribute('data-price');
            document.getElementById('add-current-price').value = selected.getAttribute('data-price');
        }

        async function loadPortfolio() {
            const data = await fetchData(`${API.portfolio}/portfolio/${getUsername()}`);
            if (!data || !data.success) return;

            const pl = data.profit_loss;
            document.getElementById('total-invested').textContent = formatMoney(data.total_invested);
            document.getElementById('current-value').textContent = formatMoney(data.total_current_value);

            const plEl = document.getElementById('profit-loss');
            plEl.textContent = formatMoney(pl);
            plEl.className = `card-value ${getPLClass(pl)}`;

            const plPct = document.getElementById('pl-percent');
            plPct.textContent = `${data.profit_loss_percent}%`;
            plPct.className = `card-value ${getPLClass(pl)}`;

            const tbody = document.getElementById('portfolio-table');
            tbody.innerHTML = '';
            data.investments.forEach(inv => {
                const totalValue = inv.shares * inv.current_price;
                const pl = totalValue - (inv.shares * inv.buy_price);
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${inv.symbol}</strong></td>
                        <td style="color:#8892a4">${inv.name}</td>
                        <td>${inv.shares}</td>
                        <td>${formatMoney(inv.buy_price)}</td>
                        <td>${formatMoney(inv.current_price)}</td>
                        <td>${formatMoney(totalValue.toFixed(2))}</td>
                        <td class="${getPLClass(pl)}">${formatMoney(pl.toFixed(2))}</td>
                        <td>
                            <button onclick="removeInvestment('${inv.symbol}')"
                            style="padding:5px 10px; background:transparent; border:1px solid #ff4d4d; color:#ff4d4d; border-radius:5px; cursor:pointer; font-size:0.8rem;">
                            Remove</button>
                        </td>
                    </tr>`;
            });
        }

        async function addInvestment() {
            const body = {
                username: getUsername(),
                symbol: document.getElementById('add-symbol').value,
                name: document.getElementById('add-name').value,
                shares: parseFloat(document.getElementById('add-shares').value),
                buy_price: parseFloat(document.getElementById('add-buy-price').value),
                current_price: parseFloat(document.getElementById('add-current-price').value)
            };
            const data = await postData(`${API.portfolio}/portfolio/add`, body);
            showMessage('add-msg', data.message, data.success);
            if (data.success) loadPortfolio();
        }

        async function removeInvestment(symbol) {
            await deleteData(`${API.portfolio}/portfolio/${getUsername()}/${symbol}`);
            loadPortfolio();
        }

        loadPortfolio();
        loadStockOptions();
    </script>
</body>
</html>
