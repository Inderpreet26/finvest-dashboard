<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - FinVest</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-logo">💹 FinVest</div>
        <div class="navbar-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="market.html">Market</a>
            <a href="news.html">News</a>
            <a href="analytics.html" class="active">Analytics</a>
        </div>
        <div class="navbar-right">
            <span class="user-info">👤 <span id="username-display"></span></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="main-content">
        <h1 class="page-title">📊 Analytics</h1>

        <!-- Risk Score -->
        <div class="cards-grid">
            <div class="card">
                <div class="card-label">Risk Score</div>
                <div class="card-value" id="risk-score">Loading...</div>
            </div>
            <div class="card">
                <div class="card-label">Risk Level</div>
                <div class="card-value" id="risk-level">Loading...</div>
            </div>
            <div class="card">
                <div class="card-label">Recommendation</div>
                <div class="card-value" id="recommendation" style="font-size:0.9rem;">Loading...</div>
            </div>
        </div>

        <!-- Sector Breakdown -->
        <div class="table-container" style="margin-bottom:25px;">
            <h2>🏢 Sector Breakdown</h2>
            <div id="sector-bars" style="margin-top:15px;"></div>
        </div>

        <!-- Portfolio Performance -->
        <div class="table-container" style="margin-bottom:25px;">
            <h2>📈 Portfolio Performance (Monthly)</h2>
            <table>
                <thead>
                    <tr>
                        <th>Month</th>
                        <th>Value</th>
                        <th>Change</th>
                    </tr>
                </thead>
                <tbody id="performance-table">
                    <tr><td colspan="3" class="loading">Loading...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- Price History -->
        <div class="table-container">
            <h2>🕐 Price History</h2>
            <div style="display:flex; gap:10px; margin-bottom:15px;">
                <select id="history-symbol" onchange="loadPriceHistory(this.value)"
                style="padding:10px; background:#0a0e1a; border:1px solid #1e2d40; border-radius:8px; color:#fff;">
                    <option value="AAPL">AAPL - Apple</option>
                    <option value="GOOGL">GOOGL - Alphabet</option>
                    <option value="TSLA">TSLA - Tesla</option>
                    <option value="MSFT">MSFT - Microsoft</option>
                    <option value="NVDA">NVDA - NVIDIA</option>
                    <option value="BTC">BTC - Bitcoin</option>
                    <option value="ETH">ETH - Ethereum</option>
                </select>
            </div>
            <div id="price-history-bars"></div>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        checkLogin();

        async function loadRiskScore() {
            const data = await fetchData(`${API.analytics}/analytics/risk-score/${getUsername()}`);
            if (!data) return;
            const scoreEl = document.getElementById('risk-score');
            scoreEl.textContent = data.risk_score;
            scoreEl.className = `card-value ${data.risk_level === 'Low' ? 'positive' : data.risk_level === 'High' ? 'negative' : ''}`;
            const levelEl = document.getElementById('risk-level');
            levelEl.textContent = data.risk_level;
            levelEl.className = `card-value ${data.risk_level === 'Low' ? 'positive' : data.risk_level === 'High' ? 'negative' : ''}`;
            document.getElementById('recommendation').textContent = data.recommendation;
        }

        async function loadSectorBreakdown() {
            const data = await fetchData(`${API.analytics}/analytics/sector-breakdown`);
            if (!data) return;
            const container = document.getElementById('sector-bars');
            container.innerHTML = '';
            data.sectors.forEach(sector => {
                container.innerHTML += `
                    <div style="margin-bottom:15px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                            <span style="color:#fff; font-size:0.9rem;">${sector.sector}</span>
                            <span style="color:#00d09c; font-size:0.9rem;">${sector.percentage}%</span>
                        </div>
                        <div style="background:#0a0e1a; border-radius:10px; height:8px;">
                            <div style="background:#00d09c; width:${sector.percentage}%; height:8px; border-radius:10px; transition:width 0.5s;"></div>
                        </div>
                    </div>`;
            });
        }

        async function loadPerformance() {
            const data = await fetchData(`${API.analytics}/analytics/portfolio-performance/${getUsername()}`);
            if (!data) return;
            const tbody = document.getElementById('performance-table');
            tbody.innerHTML = '';
            let prevValue = data.starting_value;
            data.monthly_performance.forEach(month => {
                const change = month.value - prevValue;
                const isPos = change >= 0;
                tbody.innerHTML += `
                    <tr>
                        <td>${month.month}</td>
                        <td>${formatMoney(month.value)}</td>
                        <td class="${getPLClass(change)}">${isPos ? '+' : ''}${formatMoney(change.toFixed(2))}</td>
                    </tr>`;
                prevValue = month.value;
            });
        }

        async function loadPriceHistory(symbol) {
            const data = await fetchData(`${API.analytics}/analytics/price-history/${symbol}`);
            if (!data) return;
            const container = document.getElementById('price-history-bars');
            container.innerHTML = '';
            const max = Math.max(...data.history.map(h => h.price));
            const min = Math.min(...data.history.map(h => h.price));
            container.innerHTML = `
                <div style="display:flex; align-items:flex-end; gap:3px; height:120px; margin-bottom:10px;">
                    ${data.history.map(h => {
                        const height = ((h.price - min) / (max - min)) * 100;
                        return `<div style="flex:1; background:#00d09c; opacity:0.7; height:${height}%; border-radius:2px 2px 0 0;" title="Day ${h.day}: $${h.price}"></div>`;
                    }).join('')}
                </div>
                <div style="display:flex; justify-content:space-between; color:#8892a4; font-size:0.75rem;">
                    <span>Day 1</span>
                    <span>Day 15</span>
                    <span>Day 30</span>
                </div>
                <div style="display:flex; justify-content:space-between; color:#8892a4; font-size:0.75rem; margin-top:5px;">
                    <span>Min: ${formatMoney(min.toFixed(2))}</span>
                    <span>Max: ${formatMoney(max.toFixed(2))}</span>
                </div>`;
        }

        loadRiskScore();
        loadSectorBreakdown();
        loadPerformance();
        loadPriceHistory('AAPL');
    </script>
</body>
</html>
